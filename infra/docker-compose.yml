services:
  postgres:
    image: postgres:16-alpine
    mem_limit: 2g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coinmark}
      POSTGRES_USER: ${POSTGRES_USER:-coinmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coinmark}
    ports:
      - "5432:5432"
    volumes:
      - coinmark_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    mem_limit: 256m
    ports:
      - "6379:6379"
    volumes:
      - coinmark_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.15
    mem_limit: 1024m
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "768M"
      - --reserve-memory
      - "0M"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --rpc-addr
      - redpanda:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --set
      - redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:19092"
      - "9644:9644"
      - "18082:18082"
    volumes:
      - coinmark_redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -qi healthy"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    mem_limit: 768m
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["python", "-m", "coinmark_api.main"]

  ingest:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    mem_limit: 3072m
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    command: ["python", "-m", "coinmark_api.ingest.run"]

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    mem_limit: 256m
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_HUB_URL: ws://localhost:8000/api/hub/market
    ports:
      - "5173:80"
    depends_on:
      - api

  tg-bot:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    mem_limit: 512m
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "coinmark_api.telegram.run"]

  collector-go:
    build:
      context: ../apps/collector-go
      dockerfile: Dockerfile
    mem_limit: 512m
    restart: unless-stopped
    environment:
      COLLECTOR_MARKET: swap
      COLLECTOR_BINANCE_WS_BASE_URL: wss://fstream.binance.com/stream
      COLLECTOR_BINANCE_REST_BASE: https://fapi.binance.com
      COLLECTOR_KAFKA_BROKERS: redpanda:9092
      COLLECTOR_KAFKA_TOPIC: coinmark.raw_trade.poc
      COLLECTOR_KAFKA_DEPTH_TOPIC: coinmark.raw_depth.poc
      COLLECTOR_KAFKA_CLIENT_ID: collector-go-swap
      COLLECTOR_ENABLE_DEPTH: true
      COLLECTOR_DEPTH_UPDATE_MS: 100
      COLLECTOR_SYMBOL_LIMIT: 0
      COLLECTOR_STREAMS_PER_CONN: 200
      COLLECTOR_LOG_INTERVAL_SEC: 15
    depends_on:
      redpanda:
        condition: service_healthy

  collector-go-spot:
    build:
      context: ../apps/collector-go
      dockerfile: Dockerfile
    mem_limit: 512m
    restart: unless-stopped
    environment:
      COLLECTOR_MARKET: spot
      COLLECTOR_BINANCE_WS_BASE_URL: wss://stream.binance.com:9443/stream
      COLLECTOR_BINANCE_REST_BASE: https://api.binance.com
      COLLECTOR_KAFKA_BROKERS: redpanda:9092
      COLLECTOR_KAFKA_TOPIC: coinmark.raw_trade.poc
      COLLECTOR_KAFKA_DEPTH_TOPIC: coinmark.raw_depth.poc
      COLLECTOR_KAFKA_CLIENT_ID: collector-go-spot
      COLLECTOR_ENABLE_DEPTH: true
      COLLECTOR_DEPTH_UPDATE_MS: 100
      COLLECTOR_SYMBOL_LIMIT: 0
      COLLECTOR_STREAMS_PER_CONN: 200
      COLLECTOR_LOG_INTERVAL_SEC: 15
    depends_on:
      redpanda:
        condition: service_healthy

volumes:
  coinmark_pg:
  coinmark_redis:
  coinmark_redpanda:
