services:
  postgres:
    image: postgres:16-alpine
    mem_limit: 2g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coinmark}
      POSTGRES_USER: ${POSTGRES_USER:-coinmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coinmark}
    ports:
      - "5432:5432"
    volumes:
      - coinmark_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    mem_limit: 256m
    ports:
      - "6379:6379"
    volumes:
      - coinmark_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    mem_limit: 256m
    command: ["-js", "-m", "8222", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - coinmark_nats:/data

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    mem_limit: 768m
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["python", "-m", "coinmark_api.main"]

  ingest:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    mem_limit: 3072m
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    command: ["python", "-m", "coinmark_api.ingest.run"]

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    mem_limit: 256m
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_HUB_URL: ws://localhost:8000/api/hub/market
    ports:
      - "5173:80"
    depends_on:
      - api

  tg-bot:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    mem_limit: 512m
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "coinmark_api.telegram.run"]

  collector-go:
    build:
      context: ../apps/collector-go
      dockerfile: Dockerfile
    mem_limit: 512m
    restart: unless-stopped
    environment:
      COLLECTOR_MARKET: swap
      COLLECTOR_BINANCE_WS_BASE_URL: wss://fstream.binance.com/stream
      COLLECTOR_BINANCE_REST_BASE: https://fapi.binance.com
      COLLECTOR_NATS_URL: nats://nats:4222
      COLLECTOR_NATS_STREAM_RAW: COINMARK_RAW
      COLLECTOR_NATS_SUBJECT_TRADE: coinmark.raw.trade
      COLLECTOR_NATS_SUBJECT_DEPTH: coinmark.raw.depth
      COLLECTOR_NATS_CLIENT_NAME: collector-go-swap
      COLLECTOR_ENABLE_DEPTH: true
      COLLECTOR_DEPTH_UPDATE_MS: 100
      COLLECTOR_SYMBOL_LIMIT: 0
      COLLECTOR_STREAMS_PER_CONN: 200
      COLLECTOR_LOG_INTERVAL_SEC: 15
    depends_on:
      nats:
        condition: service_started

  collector-go-spot:
    build:
      context: ../apps/collector-go
      dockerfile: Dockerfile
    mem_limit: 512m
    restart: unless-stopped
    environment:
      COLLECTOR_MARKET: spot
      COLLECTOR_BINANCE_WS_BASE_URL: wss://stream.binance.com:9443/stream
      COLLECTOR_BINANCE_REST_BASE: https://api.binance.com
      COLLECTOR_NATS_URL: nats://nats:4222
      COLLECTOR_NATS_STREAM_RAW: COINMARK_RAW
      COLLECTOR_NATS_SUBJECT_TRADE: coinmark.raw.trade
      COLLECTOR_NATS_SUBJECT_DEPTH: coinmark.raw.depth
      COLLECTOR_NATS_CLIENT_NAME: collector-go-spot
      COLLECTOR_ENABLE_DEPTH: true
      COLLECTOR_DEPTH_UPDATE_MS: 100
      COLLECTOR_SYMBOL_LIMIT: 0
      COLLECTOR_STREAMS_PER_CONN: 200
      COLLECTOR_LOG_INTERVAL_SEC: 15
    depends_on:
      nats:
        condition: service_started

volumes:
  coinmark_pg:
  coinmark_redis:
  coinmark_nats:
