name: Docker ARM64

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: docker-arm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            context: ./apps/api-go
            dockerfile: ./apps/api-go/Dockerfile
            image: coinmark-api
          - service: web
            context: ./apps/web
            dockerfile: ./apps/web/Dockerfile
            image: coinmark-web
          - service: ingest
            context: ./apps/ingest-go
            dockerfile: ./apps/ingest-go/Dockerfile
            image: coinmark-ingest
          - service: collector
            context: ./apps/collector-go
            dockerfile: ./apps/collector-go/Dockerfile
            image: coinmark-collector

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image namespace
        id: vars
        shell: bash
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${owner_lc}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-arm64
